    <text x="75" y="202" font-size="17" fill="#cbd5e1">• What should be prioritized?</text>

    <rect x="380" y="55" width="290" height="220" rx="22" fill="#111827" stroke="#334155"/>
    <text x="410" y="100" font-size="22" font-weight="700">Workflow</text>
    <text x="410" y="142" font-size="17" fill="#cbd5e1">Cleaning → Features → Models</text>
